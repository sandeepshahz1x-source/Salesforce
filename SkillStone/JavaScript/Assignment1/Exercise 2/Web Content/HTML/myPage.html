<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>first 25 even numbers</title>
  </head>
  <body>
    <script>
      function printEvenNumbers() {
        let i = 2;
        while (i < 50) {
          if (i % 2 == 0) {
            document.writeln(i + "<br>");
          }
          i++;
        }
      }
      printEvenNumbers();
    </script>
  </body>
</html>
