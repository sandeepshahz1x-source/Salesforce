<!-- Problem: Print the department chosen using if ..elseif ..else control structures

Input : Mechanical  Output : Chosen Mechanical Department -->

<!DOCTYPE html>
<html>
<head>
    <title>Department Selection</title>

</head>
<body>
      <script>

            let dept = "Civil";
            if (dept == "Mechanical") 
            {
                document.writeln("Chosen Mechanical Department");
            } 
            else if (dept == "Electrical") {
                document.writeln("Chosen Electrical Department");
            } 
            else if (dept == "Civil") {
                document.writeln("Chosen Civil Department");        } 
            else if (dept == "Computer Science")
             {
                document.writeln("Chosen Computer Science Department");
            } 
            else {
                document.writeln("Chosen No Department"); 
                }
        
    </script>


</body>
</html>
