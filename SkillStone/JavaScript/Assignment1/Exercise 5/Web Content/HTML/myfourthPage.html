<!-- Objective: This is a demo to show how to write a java script method inside a HTML page. 

Problem: Print the numbers from 1 to 10 using for loop control structure -->

<!doctype html>
<html>
  <head>
    <title>myfourthPage</title>
  </head>
  <body>
    <script>
      for (i = 0; i <= 10; i++) {
        document.writeln("Current number: " + i + "<br>");
      }
    </script>
  </body>
</html>
